<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">تعيين كلمة مرور جديدة - Owner Platform</title>
  <style>
    :root {
      --bg-0: #070b14;
      --bg-1: #0d1424;
      --panel: #141c30;
      --panel-border: rgba(148, 163, 209, 0.14);
      --accent-a: #5b7cfa;
      --accent-b: #8b5cf6;
      --text: #f3f5fb;
      --muted: #8a93ab;
      --danger: #fb7185;
      --danger-bg: rgba(251, 113, 133, 0.1);
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --radius-lg: 22px;
      --radius-md: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      background: var(--bg-0);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 124, 250, 0.16), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(139, 92, 246, 0.14), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .lang-switch {
      position: fixed;
      top: 24px;
      inset-inline-end: 24px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12.5px;
      cursor: pointer;
      width: auto;
      transition: all 0.15s ease;
    }
    .lang-switch button.active {
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff;
      border-color: transparent;
    }

    .box {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, var(--panel), var(--bg-1));
      border: 1px solid var(--panel-border);
      padding: 44px 40px 36px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 408px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.55);
      animation: rise 0.45s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-badge {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 10px 24px -8px rgba(91, 124, 250, 0.55);
    }
    .icon-badge svg { width: 26px; height: 26px; }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
      text-align: center;
      margin-bottom: 6px;
    }
    h2 {
      font-size: 21px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }
    p.subtitle {
      color: var(--muted);
      font-size: 13.5px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c3cadf;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg-0);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 20px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent-a);
      box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.18);
    }
    input::placeholder { color: #4b5568; }

    button.primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 12px 24px -12px rgba(91, 124, 250, 0.65);
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px -12px rgba(91, 124, 250, 0.75);
    }
    button.primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .error {
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid rgba(251, 113, 133, 0.25);
      padding: 13px 15px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }
    .success {
      color: var(--success);
      background: var(--success-bg);
      border: 1px solid rgba(52, 211, 153, 0.25);
      padding: 13px 15px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }

    .link-row { text-align: center; margin-top: 22px; }
    .link-row a {
      color: var(--muted);
      font-size: 13.5px;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .link-row a:hover { color: var(--text); }

    @media (prefers-reduced-motion: reduce) {
      .box { animation: none; }
    }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button type="button" id="lang-ar" onclick="setLang('ar')">عربي</button>
    <button type="button" id="lang-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="box">
    <div class="icon-badge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C9.79 2 8 3.79 8 6V9H7C5.9 9 5 9.9 5 11V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V11C19 9.9 18.1 9 17 9H16C16 9 16 9 16 9C15.45 9 15 8.55 15 8C15 7.45 15.45 7 16 7C16 7 16 7 16 6C16 4.9 15.1 4 14 4C13.34 4 12.75 4.34 12.4 4.86C12.14 4.31 11.63 3.9 11 3.77" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="12" cy="15" r="1.6" fill="white"/>
      </svg>
    </div>
    <h1>Owner Platform</h1>
    <h2 id="txt-heading">تعيين كلمة مرور جديدة</h2>
    <p class="subtitle" id="txt-tagline">اختاري كلمة مرور قوية لحماية بيانات عملك</p>
    <div class="error" id="error">حدث خطأ، يرجى المحاولة مرة أخرى</div>
    <div class="success" id="success">تم تغيير كلمة المرور بنجاح، جارٍ التحويل...</div>
    <div id="form-fields">
      <label id="lbl-password">كلمة المرور الجديدة</label>
      <input type="password" id="password" placeholder="••••••••">
      <label id="lbl-confirm">تأكيد كلمة المرور</label>
      <input type="password" id="confirm" placeholder="••••••••">
      <button type="button" class="primary" id="btn-reset" onclick="submitReset()">تعيين كلمة المرور</button>
    </div>
    <div class="link-row">
      <a href="login.html" id="link-login">العودة لتسجيل الدخول</a>
    </div>
  </div>

  <script>
    const API = "https://my-server-production-0e71.up.railway.app";

    const translations = {
      ar: {
        pageTitle: "تعيين كلمة مرور جديدة - Owner Platform",
        heading: "تعيين كلمة مرور جديدة",
        tagline: "اختاري كلمة مرور قوية لحماية بيانات عملك",
        error: "حدث خطأ، يرجى المحاولة مرة أخرى",
        success: "تم تغيير كلمة المرور بنجاح، جارٍ التحويل...",
        password: "كلمة المرور الجديدة",
        confirm: "تأكيد كلمة المرور",
        reset: "تعيين كلمة المرور",
        resetting: "جارٍ التعيين...",
        loginLink: "العودة لتسجيل الدخول",
        mismatch: "كلمتا المرور غير متطابقتين",
        invalidLink: "رابط إعادة التعيين غير موجود. يرجى طلب رابط جديد.",
      },
      en: {
        pageTitle: "Set New Password - Owner Platform",
        heading: "Set a new password",
        tagline: "Choose a strong password to protect your business data",
        error: "An error occurred, please try again",
        success: "Password changed successfully, redirecting...",
        password: "New Password",
        confirm: "Confirm Password",
        reset: "Set Password",
        resetting: "Setting...",
        loginLink: "Back to Sign In",
        mismatch: "Passwords do not match",
        invalidLink: "Reset link is missing. Please request a new one.",
      },
    };

    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById("html-root").lang = lang;
      document.getElementById("html-root").dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("page-title").textContent = t.pageTitle;
      document.getElementById("txt-heading").textContent = t.heading;
      document.getElementById("txt-tagline").textContent = t.tagline;
      document.getElementById("error").textContent = t.error;
      document.getElementById("lbl-password").textContent = t.password;
      document.getElementById("lbl-confirm").textContent = t.confirm;
      document.getElementById("btn-reset").textContent = t.reset;
      document.getElementById("link-login").textContent = t.loginLink;
      document.getElementById("lang-ar").classList.toggle("active", lang === "ar");
      document.getElementById("lang-en").classList.toggle("active", lang === "en");
    }

    function setLang(lang) {
      localStorage.setItem("authLang", lang);
      applyLang(lang);
    }

    const currentLang = localStorage.getItem("authLang") || "ar";
    applyLang(currentLang);

    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get("token");

    if (!resetToken) {
      document.getElementById("error").textContent = translations[currentLang].invalidLink;
      document.getElementById("error").style.display = "block";
      document.getElementById("form-fields").style.display = "none";
    }

    async function submitReset() {
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const btn = document.getElementById("btn-reset");
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.style.display = "none";
      successEl.style.display = "none";

      if (password !== confirm) {
        errorEl.textContent = translations[currentLang].mismatch;
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = translations[currentLang].resetting;

      try {
        const res = await fetch(`${API}/api/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: resetToken, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        successEl.textContent = data.message;
        successEl.style.display = "block";
        document.getElementById("form-fields").style.display = "none";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } catch (err) {
        errorEl.textContent = err.message || translations[currentLang].error;
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = translations[currentLang].reset;
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">تسجيل الدخول - Owner Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }
    .lang-switch {
      position: absolute;
      top: 20px;
      inset-inline-end: 20px;
      display: flex;
      gap: 6px;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      width: auto;
    }
    .lang-switch button.active {
      background: #3b82f6;
      color: #fff;
      border-color: #3b82f6;
    }
    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px;
    }
    button.primary {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button.primary:hover { background: #2563eb; }
    .error {
      color: #f87171;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .link-row { text-align: center; margin-top: 16px; }
    .link-row a { color: #94a3b8; font-size: 14px; text-decoration: none; }
    .link-row a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button type="button" id="lang-ar" onclick="setLang('ar')">عربي</button>
    <button type="button" id="lang-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="box">
    <h1>Owner Platform</h1>
    <p id="txt-tagline">سجّل دخولك للمتابعة</p>
    <div class="error" id="error">بيانات الدخول غير صحيحة، يرجى المحاولة مرة أخرى</div>
    <label id="lbl-email">البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com">
    <label id="lbl-password">كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••">
    <button type="button" class="primary" id="btn-login" onclick="login()">دخول</button>
    <div class="link-row">
      <a href="register.html" id="link-register">ليس لديك حساب؟ إنشاء حساب جديد</a>
    </div>
  </div>

  <script>
    const API = "https://my-server-production-0e71.up.railway.app";

    const translations = {
      ar: {
        pageTitle: "تسجيل الدخول - Owner Platform",
        tagline: "سجّل دخولك للمتابعة",
        error: "بيانات الدخول غير صحيحة، يرجى المحاولة مرة أخرى",
        email: "البريد الإلكتروني",
        password: "كلمة المرور",
        login: "دخول",
        registerLink: "ليس لديك حساب؟ إنشاء حساب جديد",
      },
      en: {
        pageTitle: "Sign In - Owner Platform",
        tagline: "Sign in to continue",
        error: "Incorrect login details, please try again",
        email: "Email",
        password: "Password",
        login: "Sign In",
        registerLink: "Don't have an account? Create one",
      },
    };

    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById("html-root").lang = lang;
      document.getElementById("html-root").dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("page-title").textContent = t.pageTitle;
      document.getElementById("txt-tagline").textContent = t.tagline;
      document.getElementById("error").textContent = t.error;
      document.getElementById("lbl-email").textContent = t.email;
      document.getElementById("lbl-password").textContent = t.password;
      document.getElementById("btn-login").textContent = t.login;
      document.getElementById("link-register").textContent = t.registerLink;
      document.getElementById("lang-ar").classList.toggle("active", lang === "ar");
      document.getElementById("lang-en").classList.toggle("active", lang === "en");
    }

    function setLang(lang) {
      localStorage.setItem("authLang", lang);
      applyLang(lang);
    }

    applyLang(localStorage.getItem("authLang") || "ar");

    if (localStorage.getItem("token")) {
      window.location.href = "index.html";
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const res = await fetch(`${API}/api/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "index.html";
      } catch {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">نسيت كلمة المرور - Owner Platform</title>
  <style>
    :root {
      --bg-0: #070b14;
      --bg-1: #0d1424;
      --panel: #141c30;
      --panel-border: rgba(148, 163, 209, 0.14);
      --accent-a: #5b7cfa;
      --accent-b: #8b5cf6;
      --text: #f3f5fb;
      --muted: #8a93ab;
      --danger: #fb7185;
      --danger-bg: rgba(251, 113, 133, 0.1);
      --info: #7dd3fc;
      --info-bg: rgba(56, 189, 248, 0.1);
      --radius-lg: 22px;
      --radius-md: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      background: var(--bg-0);
    }

    /* توهّج خلفي هادي، بدون أي حركة مفرطة */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 124, 250, 0.16), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(139, 92, 246, 0.14), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .lang-switch {
      position: fixed;
      top: 24px;
      inset-inline-end: 24px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12.5px;
      cursor: pointer;
      width: auto;
      transition: all 0.15s ease;
    }
    .lang-switch button.active {
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff;
      border-color: transparent;
    }

    .box {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, var(--panel), var(--bg-1));
      border: 1px solid var(--panel-border);
      padding: 44px 40px 36px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 408px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.55);
      animation: rise 0.45s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-badge {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 10px 24px -8px rgba(91, 124, 250, 0.55);
    }
    .icon-badge svg { width: 26px; height: 26px; }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
      text-align: center;
      margin-bottom: 6px;
    }
    h2 {
      font-size: 21px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }
    p.subtitle {
      color: var(--muted);
      font-size: 13.5px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c3cadf;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg-0);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 20px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent-a);
      box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.18);
    }
    input::placeholder { color: #4b5568; }

    button.primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 12px 24px -12px rgba(91, 124, 250, 0.65);
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px -12px rgba(91, 124, 250, 0.75);
    }
    button.primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .info {
      color: var(--info);
      background: var(--info-bg);
      border: 1px solid rgba(125, 211, 252, 0.25);
      padding: 13px 15px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }
    .error {
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid rgba(251, 113, 133, 0.25);
      padding: 13px 15px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }

    .link-row { text-align: center; margin-top: 22px; }
    .link-row a {
      color: var(--muted);
      font-size: 13.5px;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .link-row a:hover { color: var(--text); }

    @media (prefers-reduced-motion: reduce) {
      .box { animation: none; }
    }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button type="button" id="lang-ar" onclick="setLang('ar')">عربي</button>
    <button type="button" id="lang-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="box">
    <div class="icon-badge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C9.79 2 8 3.79 8 6V9H7C5.9 9 5 9.9 5 11V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V11C19 9.9 18.1 9 17 9H16V6C16 3.79 14.21 2 12 2ZM12 4C13.1 4 14 4.9 14 6V9H10V6C10 4.9 10.9 4 12 4Z" fill="white"/>
      </svg>
    </div>
    <h1>Owner Platform</h1>
    <h2 id="txt-heading">استعادة الوصول لحسابك</h2>
    <p class="subtitle" id="txt-tagline">أدخلي بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور</p>
    <div class="error" id="error">حدث خطأ، يرجى المحاولة مرة أخرى</div>
    <div class="info" id="info">إذا كان البريد الإلكتروني مسجلاً لدينا، فستصلك رسالة تحتوي على رابط إعادة التعيين</div>
    <label id="lbl-email">البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com">
    <button type="button" class="primary" id="btn-send" onclick="sendResetRequest()">إرسال رابط إعادة التعيين</button>
    <div class="link-row">
      <a href="login.html" id="link-login">العودة لتسجيل الدخول</a>
    </div>
  </div>

  <script>
    const API = "https://my-server-production-0e71.up.railway.app";

    const translations = {
      ar: {
        pageTitle: "نسيت كلمة المرور - Owner Platform",
        heading: "استعادة الوصول لحسابك",
        tagline: "أدخلي بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور",
        error: "حدث خطأ، يرجى المحاولة مرة أخرى",
        email: "البريد الإلكتروني",
        send: "إرسال رابط إعادة التعيين",
        sending: "جارٍ الإرسال...",
        loginLink: "العودة لتسجيل الدخول",
      },
      en: {
        pageTitle: "Forgot Password - Owner Platform",
        heading: "Recover access to your account",
        tagline: "Enter your email and we'll send you a password reset link",
        error: "An error occurred, please try again",
        email: "Email",
        send: "Send Reset Link",
        sending: "Sending...",
        loginLink: "Back to Sign In",
      },
    };

    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById("html-root").lang = lang;
      document.getElementById("html-root").dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("page-title").textContent = t.pageTitle;
      document.getElementById("txt-heading").textContent = t.heading;
      document.getElementById("txt-tagline").textContent = t.tagline;
      document.getElementById("error").textContent = t.error;
      document.getElementById("lbl-email").textContent = t.email;
      document.getElementById("btn-send").textContent = t.send;
      document.getElementById("link-login").textContent = t.loginLink;
      document.getElementById("lang-ar").classList.toggle("active", lang === "ar");
      document.getElementById("lang-en").classList.toggle("active", lang === "en");
    }

    function setLang(lang) {
      localStorage.setItem("authLang", lang);
      applyLang(lang);
    }

    const currentLang = localStorage.getItem("authLang") || "ar";
    applyLang(currentLang);

    async function sendResetRequest() {
      const email = document.getElementById("email").value;
      const btn = document.getElementById("btn-send");
      const errorEl = document.getElementById("error");
      const infoEl = document.getElementById("info");
      errorEl.style.display = "none";
      infoEl.style.display = "none";

      if (!email) return;

      btn.disabled = true;
      btn.textContent = translations[currentLang].sending;

      try {
        const res = await fetch(`${API}/api/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        infoEl.textContent = data.message;
        infoEl.style.display = "block";
      } catch (err) {
        errorEl.textContent = err.message || translations[currentLang].error;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = translations[currentLang].send;
      }
    }
  </script>
</body>
</html>

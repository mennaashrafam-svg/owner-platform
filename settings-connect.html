<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">ربط المنصات - Owner Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 40px 20px;
      position: relative;
    }
    .lang-switch {
      position: absolute;
      top: 20px;
      inset-inline-end: 20px;
      display: flex;
      gap: 6px;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: #3b82f6;
      color: #fff;
      border-color: #3b82f6;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #94a3b8; margin-bottom: 32px; }
    .card {
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 18px; margin-bottom: 8px; }
    .card p { font-size: 14px; margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .success { color: #4ade80; font-size: 14px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button type="button" id="lang-ar" onclick="setLang('ar')">عربي</button>
    <button type="button" id="lang-en" onclick="setLang('en')">EN</button>
  </div>

  <h1 id="txt-title">ربط المنصات</h1>
  <p id="txt-subtitle">اربط منصاتك ليصل المحتوى تلقائياً إلى لوحة التحكم</p>

  <div class="card">
    <h2>WhatsApp Business</h2>
    <p id="wa-desc">أدخل بيانات حساب واتساب بيزنس الخاص بك</p>
    <input type="text" id="wa-token" placeholder="WhatsApp Access Token">
    <input type="text" id="wa-phone" placeholder="Phone Number ID">
    <button type="button" id="wa-btn" onclick="saveWhatsapp()">ربط واتساب</button>
    <div class="success" id="wa-success">تم الربط بنجاح!</div>
  </div>

  <div class="card">
    <h2 id="ig-title">إنستجرام</h2>
    <p id="ig-desc">أدخل بيانات حساب إنستجرام الخاص بك</p>
    <input type="text" id="ig-token" placeholder="Instagram Access Token">
    <input type="text" id="ig-id" placeholder="Instagram Account ID">
    <button type="button" id="ig-btn" onclick="saveInstagram()">ربط إنستجرام</button>
    <div class="success" id="ig-success">تم الربط بنجاح!</div>
  </div>

  <div class="card">
    <h2 id="fb-title">فيسبوك</h2>
    <p id="fb-desc">أدخل بيانات حساب فيسبوك الخاص بك</p>
    <input type="text" id="fb-token" placeholder="Facebook Access Token">
    <input type="text" id="fb-id" placeholder="Page ID">
    <button type="button" id="fb-btn" onclick="saveFacebook()">ربط فيسبوك</button>
    <div class="success" id="fb-success">تم الربط بنجاح!</div>
  </div>

  <script>
    const API = "https://my-server-production-0e71.up.railway.app";
    const token = localStorage.getItem("token");

    if (!token) window.location.href = "login.html";

    const translations = {
      ar: {
        pageTitle: "ربط المنصات - Owner Platform",
        title: "ربط المنصات",
        subtitle: "اربط منصاتك ليصل المحتوى تلقائياً إلى لوحة التحكم",
        waDesc: "أدخل بيانات حساب واتساب بيزنس الخاص بك",
        waBtn: "ربط واتساب",
        igTitle: "إنستجرام",
        igDesc: "أدخل بيانات حساب إنستجرام الخاص بك",
        igBtn: "ربط إنستجرام",
        fbTitle: "فيسبوك",
        fbDesc: "أدخل بيانات حساب فيسبوك الخاص بك",
        fbBtn: "ربط فيسبوك",
        success: "تم الربط بنجاح!",
      },
      en: {
        pageTitle: "Connect Platforms - Owner Platform",
        title: "Connect Platforms",
        subtitle: "Connect your platforms so conversations reach your dashboard automatically",
        waDesc: "Enter your WhatsApp Business account details",
        waBtn: "Connect WhatsApp",
        igTitle: "Instagram",
        igDesc: "Enter your Instagram account details",
        igBtn: "Connect Instagram",
        fbTitle: "Facebook",
        fbDesc: "Enter your Facebook account details",
        fbBtn: "Connect Facebook",
        success: "Connected successfully!",
      },
    };

    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById("html-root").lang = lang;
      document.getElementById("html-root").dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("page-title").textContent = t.pageTitle;
      document.getElementById("txt-title").textContent = t.title;
      document.getElementById("txt-subtitle").textContent = t.subtitle;
      document.getElementById("wa-desc").textContent = t.waDesc;
      document.getElementById("wa-btn").textContent = t.waBtn;
      document.getElementById("wa-success").textContent = t.success;
      document.getElementById("ig-title").textContent = t.igTitle;
      document.getElementById("ig-desc").textContent = t.igDesc;
      document.getElementById("ig-btn").textContent = t.igBtn;
      document.getElementById("ig-success").textContent = t.success;
      document.getElementById("fb-title").textContent = t.fbTitle;
      document.getElementById("fb-desc").textContent = t.fbDesc;
      document.getElementById("fb-btn").textContent = t.fbBtn;
      document.getElementById("fb-success").textContent = t.success;
      document.getElementById("lang-ar").classList.toggle("active", lang === "ar");
      document.getElementById("lang-en").classList.toggle("active", lang === "en");
    }

    function setLang(lang) {
      localStorage.setItem("authLang", lang);
      applyLang(lang);
    }

    applyLang(localStorage.getItem("authLang") || "ar");

    async function savePlatform(platform, data) {
      const res = await fetch(`${API}/api/settings/platforms`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ platform, ...data })
      });
      return res.ok;
    }

    async function saveWhatsapp() {
      const ok = await savePlatform("whatsapp", {
        token: document.getElementById("wa-token").value,
        phoneId: document.getElementById("wa-phone").value
      });
      if (ok) document.getElementById("wa-success").style.display = "block";
    }

    async function saveInstagram() {
      const ok = await savePlatform("instagram", {
        token: document.getElementById("ig-token").value,
        accountId: document.getElementById("ig-id").value
      });
      if (ok) document.getElementById("ig-success").style.display = "block";
    }

    async function saveFacebook() {
      const ok = await savePlatform("facebook", {
        token: document.getElementById("fb-token").value,
        pageId: document.getElementById("fb-id").value
      });
      if (ok) document.getElementById("fb-success").style.display = "block";
    }
  </script>
</body>
</html>
